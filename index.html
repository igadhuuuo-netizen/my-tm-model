<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-purple: #8a2be2;
            --glass-bg: rgba(20, 20, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            /* Animated gradient background */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The Frosted Glass Card */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        /* Decorative glowing orbs behind the card */
        .glass-panel::before, .glass-panel::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.6;
        }
        .glass-panel::before {
            width: 200px; height: 200px;
            background: var(--neon-blue);
            top: -50px; left: -50px;
        }
        .glass-panel::after {
            width: 200px; height: 200px;
            background: var(--neon-purple);
            bottom: -50px; right: -50px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-weight: 700;
            font-size: 32px;
            background: -webkit-linear-gradient(45deg, var(--neon-blue), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #b0b0c0;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Sleek Button */
        .glow-btn {
            background: transparent;
            color: #fff;
            border: 2px solid var(--neon-blue);
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .glow-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
            transform: translateY(-2px);
        }

        #status-text {
            display: block;
            margin-top: 15px;
            font-size: 13px;
            color: var(--neon-blue);
            height: 20px;
        }

        /* Camera Feed */
        #webcam-container {
            margin-top: 25px;
            display: none;
            justify-content: center;
        }

        #webcam-container canvas {
            border-radius: 16px;
            width: 100%;
            max-width: 280px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255,255,255,0.05);
        }

        /* Futuristic Progress Bars */
        #label-container {
            margin-top: 30px;
            display: none;
            flex-direction: column;
            gap: 18px;
            text-align: left;
        }

        .pred-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .pred-value {
            color: var(--neon-blue);
            font-weight: 700;
        }

        .track {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            border-radius: 10px;
            transition: width 0.15s ease-out;
            box-shadow: 0 0 10px var(--neon-blue);
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Vision AI</h1>
        <p class="subtitle">Real-time object classification</p>
        
        <button class="glow-btn" id="start-btn" onclick="init()">Initialize</button>
        <span id="status-text"></span>
        
        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "./"; // Your local model path

        let model, webcam, labelContainer, maxPredictions;
        const btn = document.getElementById("start-btn");
        const status = document.getElementById("status-text");

        async function init() {
            try {
                btn.style.display = "none";
                status.innerText = "Connecting to Neural Network...";

                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                status.innerText = "Accessing optical sensor...";

                const flip = true; 
                webcam = new tmImage.Webcam(300, 300, flip); 
                
                await webcam.setup();
                await webcam.play();
                window.requestAnimationFrame(loop);

                document.getElementById("webcam-container").style.display = "flex";
                document.getElementById("label-container").style.display = "flex";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                labelContainer = document.getElementById("label-container");
                for (let i = 0; i < maxPredictions; i++) {
                    const row = document.createElement("div");
                    row.innerHTML = `
                        <div class="pred-header">
                            <span id="name-${i}">Class</span>
                            <span class="pred-value" id="val-${i}">0%</span>
                        </div>
                        <div class="track">
                            <div class="fill" id="fill-${i}"></div>
                        </div>
                    `;
                    labelContainer.appendChild(row);
                }

                status.innerText = "Analysis Active";
                status.style.color = "#00f0ff";

            } catch (error) {
                status.innerText = "System Error: Check camera permissions.";
                status.style.color = "#ff3366";
                btn.style.display = "inline-block";
                btn.innerText = "Retry";
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const percent = Math.round(prediction[i].probability * 100);
                
                document.getElementById(`name-${i}`).innerText = prediction[i].className;
                document.getElementById(`val-${i}`).innerText = percent + "%";
                document.getElementById(`fill-${i}`).style.width = percent + "%";
                
                // Color shifting based on confidence
                const fillBar = document.getElementById(`fill-${i}`);
                if (percent > 85) {
                    fillBar.style.background = "linear-gradient(90deg, #00f0ff, #00ff88)";
                    fillBar.style.boxShadow = "0 0 15px #00ff88";
                } else {
                    fillBar.style.background = "linear-gradient(90deg, #8a2be2, #00f0ff)";
                    fillBar.style.boxShadow = "0 0 10px #00f0ff";
                }
            }
        }
    </script>
</body>
</html>
