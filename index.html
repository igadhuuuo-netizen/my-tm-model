<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Classifier</title>
    <!-- Importing a clean, modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3a8dff;
            --primary-hover: #00d2ff;
            --bg-color: #12121c;
            --card-bg: #1e1e2f;
            --text-main: #ffffff;
            --text-muted: #a0a0b5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Main Container Card */
        .app-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        p.description {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Status and Confirmations */
        #status-message {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-hover);
            margin-bottom: 20px;
            min-height: 20px; /* Prevents layout shift */
            transition: color 0.3s;
        }

        /* Start Button */
        button {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(58, 141, 255, 0.3);
            width: 100%;
            max-width: 250px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 210, 255, 0.4);
        }

        button:disabled {
            background: #333344;
            color: #777;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Webcam styling */
        #webcam-container {
            margin-top: 25px;
            border-radius: 16px;
            overflow: hidden;
            display: none; /* Hidden until loaded */
            justify-content: center;
            border: 3px solid var(--primary);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        #webcam-container canvas {
            display: block;
            border-radius: 12px;
            width: 100%; /* Responsive to container */
            max-width: 300px; /* Prevents it from getting too huge */
            height: auto;
        }

        /* Prediction Bars Styling */
        #label-container {
            margin-top: 25px;
            display: none; /* Hidden until loaded */
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .prediction-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .class-label {
            font-weight: 600;
            font-size: 15px;
        }

        .class-percent {
            font-weight: 800;
            color: var(--primary-hover);
        }

        .progress-bar-bg {
            background-color: #2a2a40;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--primary), var(--primary-hover));
            height: 100%;
            width: 0%; /* Adjusted by JavaScript */
            border-radius: 10px;
            transition: width 0.1s ease-out; /* Smooth animation for live bar */
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Vision Classifier</h1>
        <p class="description">Click start and face the camera. The AI will analyze your feed in real-time to detect if you are wearing glasses or not.</p>
        
        <div id="status-message"></div>
        
        <button type="button" id="start-btn" onclick="init()">Start Camera</button>
        
        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <!-- AI Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // Points to the current folder on your GitHub
        const URL = "./";

        let model, webcam, labelContainer, maxPredictions;
        const statusText = document.getElementById("status-message");
        const startBtn = document.getElementById("start-btn");

        async function init() {
            try {
                // Disable button and update status so user knows it's working
                startBtn.disabled = true;
                startBtn.innerText = "Initializing...";
                statusText.innerText = "Downloading AI Model... (This takes a moment)";
                statusText.style.color = "#a0a0b5";

                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                // Load the model
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                statusText.innerText = "Requesting camera permissions...";

                // Setup the webcam
                const flip = true; 
                webcam = new tmImage.Webcam(300, 300, flip); // Slightly larger camera resolution
                
                await webcam.setup(); // request access to the webcam
                await webcam.play();
                
                window.requestAnimationFrame(loop);

                // Reveal containers
                document.getElementById("webcam-container").style.display = "flex";
                document.getElementById("label-container").style.display = "flex";
                
                // Append canvas
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                // Build dynamic progress bars instead of simple text
                labelContainer = document.getElementById("label-container");
                for (let i = 0; i < maxPredictions; i++) {
                    const classWrapper = document.createElement("div");
                    
                    // Create the HTML structure for each prediction label & progress bar
                    classWrapper.innerHTML = `
                        <div class="prediction-row">
                            <span class="class-label" id="label-name-${i}">Loading...</span>
                            <span class="class-percent" id="label-percent-${i}">0%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="label-bar-${i}"></div>
                        </div>
                    `;
                    labelContainer.appendChild(classWrapper);
                }

                // Final status update
                statusText.innerText = "Model loaded successfully! Running analysis.";
                statusText.style.color = "#00d2ff";
                startBtn.style.display = "none"; // Hide button once running

            } catch (error) {
                // Error handling if camera is denied or files are missing
                statusText.innerText = "Error: Please allow camera access and ensure files are correct.";
                statusText.style.color = "#ff4a4a";
                startBtn.disabled = false;
                startBtn.innerText = "Try Again";
                console.error(error);
            }
        }

        async function loop() {
            webcam.update(); // update the webcam frame
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            // run the webcam image through the image model
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                // Calculate percentage
                const percentage = (prediction[i].probability * 100).toFixed(0);
                const className = prediction[i].className;

                // Update text and progress bar widths dynamically
                document.getElementById(`label-name-${i}`).innerText = className;
                document.getElementById(`label-percent-${i}`).innerText = percentage + "%";
                document.getElementById(`label-bar-${i}`).style.width = percentage + "%";
                
                // Optional: Change bar color if it's highly confident
                if(percentage > 85) {
                    document.getElementById(`label-bar-${i}`).style.background = "linear-gradient(90deg, #00d2ff, #00ff88)";
                } else {
                    document.getElementById(`label-bar-${i}`).style.background = "linear-gradient(90deg, #3a8dff, #00d2ff)";
                }
            }
        }
    </script>
</body>
</html>
